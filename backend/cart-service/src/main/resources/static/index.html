<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team G16 - Cart Service</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; }
    .container { max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    button.delete { background: #dc3545; }
    input { padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container">
  <h2>🛒 Cart Service (Group 16)</h2>
  <div id="cart-list"></div>
  <hr>
  <h4>Add Test Product</h4>
  <input type="text" id="name" placeholder="Product Name"><br>
  <input type="number" id="price" placeholder="Price"><br>
  <button onclick="addItem()">Add to Cart</button>
</div>

<script>
  const API_URL = '/api/cart';

  async function loadCart() {
      const response = await fetch(API_URL);
      const items = await response.json();
      const listDiv = document.getElementById('cart-list');
      listDiv.innerHTML = items.length ? '' : '<p>Cart is empty</p>';
      items.forEach(item => {
          listDiv.innerHTML += `
              <div class="item-row">
                  <span>${item.productName} - $${item.price}</span>
                  <button class="delete" onclick="deleteItem(${item.id})">Delete</button>
              </div>`;
      });
  }

  async function addItem() {
      const name = document.getElementById('name').value;
      const price = document.getElementById('price').value;
      await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productName: name, price: price, quantity: 1 })
      });
      loadCart();
  }

  async function deleteItem(id) {
      await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      loadCart();
  }

  loadCart();
</script>
</body>
</html>
